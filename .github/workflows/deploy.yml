name: ChatApp CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build backend
        run: docker build -t backend ./ci-cd-automation/backend

      - name: Build frontend
        run: docker build -t frontend ./ci-cd-automation/frontend

      - name: Build successful
        run: echo "CI pipeline completed"
